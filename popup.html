<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="src/popup.css" />
</head>
<body>
<div id="frame">
    <div style="display: flex;">
        <input
            type="text"
            name="field"
            autocomplete="off"
            class="edit_input"
            id="new-manual-selector"
            placeholder="Selector"
        />
        <button class="edit_button edit_button_apply" id="new_rule_apply">
            Create
        </button>
        <button class="edit_button" id="delete_all">
            Delete all
        </button>
    </div>
    <div><span>Selectors for <code id="current_domain"></code></span></div>
    <div id="header">

    </div>
    <dialog class="modal_dialog" id="edit_dialog" style="width: 400px">
        <h6>Edit selector:</h6>
        <div class="edit_fields">
            <input
                style="display: none;"
                type="text"
                name="field"
                autocomplete="off"
                class="edit_input"
                id="domain"
                placeholder="Domain"
            />
            <input
                type="text"
                name="field"
                autocomplete="off"
                class="edit_input"
                id="new-value"
                placeholder="Selector"
            />
        </div>

        <div id="edit_id" style="display: none;"></div>
        <div class="edit_buttons">
            <button class="edit_button" id="edit_discard">
                Discard
            </button>
            <button class="edit_button edit_button_apply" id="edit_apply">
                Apply
            </button>
        </div>
    </dialog>
</div>
</body>
<script type="text/javascript" src="src/jquery-3.6.0.min.js"></script>
<script type="text/javascript" src="src/popup.js"></script>
</html>
